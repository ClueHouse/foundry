<!DOCTYPE html>
<html lang="en-NZ">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>The Foundry</title>
  <meta name="description" content="Your new site. Stupidly easy. Future-proof. Done." />

  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <header class="foundry-header">
    <span class="foundry-brand">THE FOUNDRY</span>

    <button
      class="foundry-anvil-menu"
      id="foundryToggle"
      type="button"
      aria-label="Open Foundry menu"
      aria-expanded="false"
    >
      <img
        class="foundry-header-anvil"
        src="./assets/brand/anvil-mark.svg"
        alt=""
      />
    </button>
  </header>

  <div class="site-blur-wrap" id="siteBlurWrap">
    <main class="page home-page">
      <section class="hero">
        <h1>
          <span>Your new site.</span>
          <span>Stupidly easy.</span>
          <span>Future-proof.</span>
          <span>Done.</span>
        </h1>

        <div class="button-row">
          <a class="button button-primary" href="./start/">Sort It</a>
          <a class="button button-secondary" href="./possibilities/">Explore</a>
        </div>
      </section>
    </main>
  </div>

  <div
    class="foundry-overlay"
    id="foundryOverlay"
    aria-hidden="true"
  >
    <button
      class="foundry-close"
      id="foundryClose"
      type="button"
      aria-label="Close Foundry menu"
    >
      Close
    </button>

    <div class="foundry-window-wrap">
      <a class="foundry-window" href="./whywebsite/">
        <span>Why Do I Need a Website?</span>
      </a>

      <a class="foundry-window" href="./the-foundry/">
        <span>Why Choose The Foundry?</span>
      </a>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
