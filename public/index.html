<!DOCTYPE html>
<html lang="en-NZ">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>The Foundry</title>
  <meta name="description" content="Your new site. Stupidly easy. Future-proof. Done." />

  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <header class="site-title-bar">
    <a class="title-bar-link title-bar-home" href="./" aria-label="Home">
      <svg class="title-bar-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M3 11.5L12 4l9 7.5" />
        <path d="M5.5 10.5V20h5v-5.5h3V20h5v-9.5" />
      </svg>
      <span>Home</span>
    </a>

    <button class="title-bar-link title-bar-foundry" type="button" id="foundryToggle" aria-expanded="false">
      <svg class="title-bar-icon anvil-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M4 8h12.5c1.6 0 2.9-1.3 2.9-2.9V4H21v3.2c0 2.1-1.7 3.8-3.8 3.8H15l-2.2 3H6.5L4 8z" />
        <path d="M8 14h7" />
        <path d="M10 14v4" />
        <path d="M7.5 20h9" />
      </svg>
      <span>The Foundry</span>
    </button>
  </header>

  <main class="page home-page">
    <section class="hero">
      <h1>
        <span>Your new site.</span>
        <span>Stupidly easy.</span>
        <span>Future-proof.</span>
        <span>Done.</span>
      </h1>

      <div class="button-row">
        <a class="button button-primary" href="./start/">Sort It</a>
        <a class="button button-secondary" href="./possibilities/">Explore</a>
      </div>
    </section>
  </main>

  <section class="foundry-overlay" id="foundryOverlay" aria-hidden="true">
    <div class="foundry-overlay-panel">
      <button class="foundry-close" type="button" id="foundryClose" aria-label="Close Foundry menu">×</button>

      <div class="foundry-plaque-wrap">
        <a class="foundry-plaque" href="./why-a-website/">
          <span>Why do I need a website?</span>
        </a>

        <a class="foundry-plaque" href="./why-the-foundry/">
          <span>Why should I choose The Foundry?</span>
        </a>
      </div>
    </div>
  </section>

  <script src="./script.js"></script>
</body>
</html>
