<!DOCTYPE html>
<html lang="en-NZ">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>The Foundry</title>
  <meta
    name="description"
    content="Your new site. Stupidly easy. Future-proof. Done."
  />

  <link rel="stylesheet" href="./styles.css" />
</head>

<body class="homepage">

  <header class="foundry-header">
    <span class="foundry-brand">
      THE FOUNDRY
    </span>

    <span
      class="foundry-anvil-menu"
      aria-hidden="true"
    >
      <img
        class="foundry-header-anvil"
        src="./assets/brand/anvil-mark.svg"
        alt=""
      />
    </span>
  </header>

  <div
    class="site-blur-wrap"
    id="siteBlurWrap"
  >
    <main class="page home-page">

      <section class="hero">

        <h1>
          <span>Your new site.</span>
          <span>Stupidly easy.</span>
          <span>Future-proof.</span>
          <span>Done.</span>
        </h1>

        <div class="button-row">

          <a
            class="button button-primary"
            href="./start/"
          >
            Sort It
          </a>

          <button
            class="button button-secondary"
            id="foundryExplore"
            type="button"
            aria-label="Open Explore menu"
            aria-expanded="false"
          >
            Explore
          </button>

        </div>

      </section>

    </main>
  </div>

  <div
    class="foundry-overlay"
    id="foundryOverlay"
    aria-hidden="true"
  >

    <button
      class="foundry-close"
      id="foundryClose"
      type="button"
      aria-label="Close Explore menu"
    >
      Close
    </button>
<div class="foundry-window-wrap">

  <a
    class="foundry-window"
    href="./whywebsite/"
  >
    <span>
      Why Do I Need A Website?
    </span>
  </a>

  <a
    class="foundry-window"
    href="./the-foundry/"
  >
    <span>
      Why Choose The Foundry?
    </span>
  </a>

  <a
    class="foundry-window boardroom-window"
    href="./possibilities/"
  >
    <span>
      The Boardroom
    </span>
  </a>

</div>

  </div>

  <script>
    const exploreButton = document.getElementById("foundryExplore");
    const closeButton = document.getElementById("foundryClose");
    const overlay = document.getElementById("foundryOverlay");
    const blurWrap = document.getElementById("siteBlurWrap");

    function openOverlay() {
      overlay.classList.add("is-open");
      overlay.setAttribute("aria-hidden", "false");
      exploreButton.setAttribute("aria-expanded", "true");
      blurWrap.classList.add("is-blurred");
    }

    function closeOverlay() {
      overlay.classList.remove("is-open");
      overlay.setAttribute("aria-hidden", "true");
      exploreButton.setAttribute("aria-expanded", "false");
      blurWrap.classList.remove("is-blurred");
    }

    exploreButton.addEventListener("click", openOverlay);
    closeButton.addEventListener("click", closeOverlay);

    overlay.addEventListener("click", function (event) {
      if (event.target === overlay) {
        closeOverlay();
      }
    });

    document.addEventListener("keydown", function (event) {
      if (event.key === "Escape") {
        closeOverlay();
      }
    });
  </script>

</body>
</html>
