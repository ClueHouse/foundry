<!DOCTYPE html>
<html lang="en-NZ">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>The Foundry</title>
  <meta name="description" content="Your new site. Stupidly easy. Future-proof. Done." />

  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <header class="site-title-bar">

    <button
      class="mobile-menu-button"
      type="button"
      id="foundryToggleMobile"
      aria-label="Open menu"
      aria-expanded="false"
    >
      ☰
    </button>

    <a class="home-link" href="./" aria-label="Home">
      <span class="home-text">Home</span>
      <img
        src="./assets/brand/foundry-home.png"
        alt=""
        class="home-icon"
      />
    </a>

    <button
      class="foundry-mark"
      type="button"
      id="foundryToggle"
      aria-label="Open Foundry menu"
      aria-expanded="false"
    >
      <span class="foundry-mark-small">The</span>
      <span class="foundry-mark-large">Foundry</span>

      <img
        src="./assets/brand/foundry-anvil.png"
        alt=""
        class="foundry-mark-anvil"
      />
    </button>

  </header>

  <div class="site-blur-wrap" id="siteBlurWrap">
    <main class="page home-page">
      <section class="hero">

        <h1>
          <span>Your new site.</span>
          <span>Stupidly easy.</span>
          <span>Future-proof.</span>
          <span>Done.</span>
        </h1>

        <div class="button-row">
          <a class="button button-primary" href="./start/">Sort It</a>
          <a class="button button-secondary" href="./possibilities/">Explore</a>
        </div>

      </section>
    </main>
  </div>

  <section
    class="foundry-overlay"
    id="foundryOverlay"
    aria-hidden="true"
  >

    <button
      class="foundry-close"
      type="button"
      id="foundryClose"
      aria-label="Close menu"
    >
      ×
    </button>

    <div class="foundry-window-wrap foundry-desktop-menu">

      <a
        class="foundry-window"
        href="./why-a-website/"
      >
        <span>Why have a website?</span>
      </a>

      <a
        class="foundry-window"
        href="./the-foundry/"
      >
        <span>Why choose The Foundry?</span>
      </a>

    </div>

    <div class="foundry-window-wrap foundry-menu-list">

      <a class="foundry-menu-link" href="./">
        Home
      </a>

      <a class="foundry-menu-link" href="./start/">
        Start Here
      </a>

      <a class="foundry-menu-link" href="./possibilities/">
        Possibilities
      </a>

      <a class="foundry-menu-link" href="#">
        Pricing (Coming Soon)
      </a>

      <a class="foundry-menu-link" href="#">
        Client Stories (Coming Soon)
      </a>

      <a class="foundry-menu-link" href="#">
        Contact (Coming Soon)
      </a>

    </div>

  </section>

  <script src="./script.js"></script>
</body>
</html>
