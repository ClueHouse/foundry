<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Hole In One - Wholistic Donuts</title>
    <link rel="stylesheet" href="../styles/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Playfair+Display:ital,wght@0,700;1,700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header id="header">
        <div class="header-container">
            <button class="logo-section" type="button" data-modal="contact" aria-label="Open contact information">
                <img src="assets/images/logo.png" alt="A Hole In One Logo" class="logo-img">
                <div class="brand-text">
                    <h1>A HOLE IN ONE</h1>
                    <span class="subtitle">WHOLISTIC DONUTS</span>
                </div>
            </button>

            <nav class="desktop-nav" aria-label="Main navigation">
                <ul>
                    <li><button type="button" class="nav-button" data-modal="menu">MENU</button></li>
                    <li><button type="button" class="nav-button" data-modal="catering">CATERING</button></li>
                    <li><button type="button" class="nav-button" data-modal="reviews">REVIEWS</button></li>
                    <li><button type="button" class="nav-button" data-modal="contact">CONTACT</button></li>
                </ul>
            </nav>

            <div class="header-actions">
                <button class="btn btn-primary order-btn-header" type="button" data-modal="order">ORDER NOW &rarr;</button>
                <button class="hamburger" id="hamburger" type="button" aria-label="Open menu" aria-expanded="false">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </div>

        <nav class="mobile-nav" id="mobile-nav" aria-label="Mobile navigation">
            <ul>
                <li><button type="button" class="nav-button" data-modal="menu">MENU</button></li>
                <li><button type="button" class="nav-button" data-modal="catering">CATERING</button></li>
                <li><button type="button" class="nav-button" data-modal="reviews">REVIEWS</button></li>
                <li><button type="button" class="nav-button" data-modal="contact">CONTACT</button></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero" aria-label="A Hole In One hero">
            <div class="hero-overlay"></div>
            <div class="hero-content">
                <div class="hero-text-area">
                    <h2 class="hero-title">DONUTS.<br>COFFEE.</h2>
                    <p class="hero-tagline">Glazed to perfection.</p>
                    <div class="hero-description">
                        <p>Superb donuts.</p>
                        <p>Real ingredients.</p>
                        <p>Made fresh. Every day.</p>
                    </div>
                    <div class="hero-cta">
                        <button class="btn btn-primary btn-large order-btn" type="button" data-modal="order">ORDER NOW &rarr;</button>
                        <button class="btn btn-secondary btn-large menu-btn" type="button" data-modal="menu">VIEW MENU</button>
                    </div>
                </div>
            </div>
        </section>

        <section class="info-strip" aria-label="Essential business information">
            <div class="info-item">
                <div class="info-icon" aria-hidden="true">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                </div>
                <div class="info-text">
                    <h3>OPEN TODAY</h3>
                    <p>6:30AM – 4:00PM</p>
                </div>
            </div>

            <button class="info-item clickable" type="button" data-modal="contact">
                <div class="info-icon" aria-hidden="true">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                </div>
                <div class="info-text">
                    <h3>23 BAKER STREET</h3>
                    <p>TAURANGA</p>
                </div>
            </button>

            <a class="info-item clickable" href="tel:075554321">
                <div class="info-icon" aria-hidden="true">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                </div>
                <div class="info-text">
                    <h3>07 555 4321</h3>
                </div>
            </a>

            <a class="info-item clickable" href="https://instagram.com/aholeinonedonuts" target="_blank" rel="noopener noreferrer">
                <div class="info-icon" aria-hidden="true">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
                </div>
                <div class="info-text">
                    <h3>FOLLOW US</h3>
                    <p>@AHOLEINONEDONUTS</p>
                </div>
            </a>
        </section>
    </main>

    <div id="modal" class="modal" aria-hidden="true">
        <div class="modal-backdrop" data-close-modal></div>
        <div class="modal-content" role="dialog" aria-modal="true" aria-label="Billboard overlay">
            <button class="close-modal" type="button" aria-label="Close overlay">&times;</button>
            <img id="modal-image" class="modal-image" src="" alt="">
        </div>
    </div>

    <script src="scripts/app.js"></script>
</body>
</html>
